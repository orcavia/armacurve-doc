name: Deploy to orcavia.dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout orcavia.dev site
        uses: actions/checkout@v4
        with:
          repository: orcavia/orcavia.github.io
          token: ${{ secrets.ORCAVIA_PAGES_TOKEN }}
          path: orcavia-site

      - name: Copy static files to /armacurve
        run: |
          rm -rf orcavia-site/armacurve
          mkdir -p orcavia-site/armacurve
          cp -a static/. orcavia-site/armacurve/

      - name: Publish to orcavia.dev/armacurve
        run: |
          cd orcavia-site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Deploy Armacurve update feed"
          git push
